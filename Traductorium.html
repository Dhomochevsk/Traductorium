<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Lector</title>
    <link rel="stylesheet" href="Traductorium.css">
</head>
<body>


<!-- Toolbar -->
<div class="toolbar" role="banner">
  <img
    width="20"
    alt="Angular Logo"
    src="https://cdn-icons-png.freepik.com/512/59/59870.png"
  />

  <span>CORPORACION FRAUDUSUARIA</span>

</div>
    


<div class="container">

    <div class="left-panel">


        <div class="toolbarLeft">

            <button id="prev">Anterior</button>
            <button id="next">Siguiente</button>

            <button id="decreaseFont">A-</button>
            <button id="increaseFont">A+</button>

            <select id="chapterList">
                <option value="">Capítulos</option>
            </select>

            <button id="exit">X</button>

        </div>



        <div id="drop-zone">
            Arrastra aquí un EPUB o PDF
        </div>

        <div id="Contentviewer">
            <div id="viewer">

            </div>
        </div>


    </div>

    <div class="right-panel">

        <div class="toolbarRight">
            <span>CORPORACION FRAUDUSUARIA</span>

            <button id="newDoc">Nuevo DOCX</button>
            <button id="saveDoc">Guardar DOCX</button>
        </div>

        <div id="drop-docx">
            Arrastra aquí un archivo DOCX
        </div>

        <div id="ContentDoc">
            <div id="editor" contenteditable="true"></div>
        </div>



    </div>

</div>

<script src="libs/jszip.min.js"></script>
<script src="libs/epub.min.js"></script>
<script src="libs/pdf.min.js"></script>

<script src="libs/docx.min.js"></script>
<script src="libs/mammoth.browser.min.js"></script>

<script src="script.js"></script>

</body>
</html>
